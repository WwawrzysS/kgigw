<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="canonical" href="/kgigw/stoisko/" />
  <title>KGiGW STOISKO</title>
</head>
<body>
  <p>Przenoszę do strony STOISKO: <a href="/kgigw/stoisko/">otwórz STOISKO</a>.</p>
  <script>
    async function cleanupOldWorkers() {
      if (!("serviceWorker" in navigator)) return;
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations
        .filter((registration) => {
          const worker = registration.active || registration.waiting || registration.installing;
          return worker && worker.scriptURL.includes("/kgigw/sw-wypozyczalnia.js");
        })
        .map((registration) => registration.unregister()));
    }

    cleanupOldWorkers()
      .catch((error) => console.error("Nie udało się wyczyścić starego PWA.", error))
      .finally(() => window.location.replace("/kgigw/stoisko/"));
  </script>
</body>
</html>
